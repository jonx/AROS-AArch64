name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  run68k:
    name: build run68k + run the 68k corpus samples
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the 68k JIT
        run: make run68k
      - name: Run 68k samples (JIT + interpreter oracle)
        # These programs return their computed result as the exit code, so
        # capture it explicitly (the runner shell is bash -e).
        run: |
          expect() { rc=0; build/run68k "hosted/jit68k/apps68k/bin/$1" || rc=$?; \
                     [ "$rc" -eq "$2" ] || { echo "$1: got $rc want $2"; exit 1; }; }
          expect mandel.exe 0
          expect bubsort.exe 245
          expect sumsq.exe 55
